interview:
  summarizer:
    # Approximate tokens in chat before summarizer runs (chars / 4 used internally).
    token_threshold: 1500
    # Max characters for the combined interview_summary stored in MongoDB.
    max_summary_chars: 8000
    # Max characters of transcript sent to the summarizer per pass.
    input_max_chars: 16000
  feedback:
    # When true, feedback agent prioritizes interview_summary over full transcript.
    use_summary_primary: true
  question_bank:
    # Questions injected into interviewer context per turn.
    seeds_per_interviewer: 12
    # Max stored questions per (job_role, experience_level) bucket.
    max_questions_per_bucket: 200
    # Max transcript chars sent to summarizer for question extraction.
    extract_max_chars: 12000
  limits:
    # Max technical questions each panel member may ask before the closing phase.
    max_questions_per_interviewer: 8
    # Max candidate-question / panel-answer rounds after the panel invites questions.
    max_candidate_qa_turns: 2
