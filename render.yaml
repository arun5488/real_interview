# Render Blueprint — free-tier web service (sleeps after ~15 min idle; wakes on next visit).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: real-interview
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app.real_interview.backend.wsgi:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: real_interview
      - key: MONGODB_COLLECTION_USERS
        value: authentications
      - key: MONGODB_COLLECTION_RESUMES
        value: resumes
      - key: MONGODB_COLLECTION_JOB_APPLICATIONS
        value: job_application
      - key: MONGODB_COLLECTION_INTERVIEW
        value: interview
      - key: MONGODB_COLLECTION_QUESTION_BANK
        value: interview_question_bank
      - key: MONGODB_COLLECTION_RATE_LIMITS
        value: rate_limits
      - key: MONGODB_COLLECTION_REVOKED_TOKENS
        value: revoked_tokens
      - key: MONGODB_GRIDFS_RESUME_BUCKET
        value: resume_pdf_fs
      - key: MONGODB_CHECKPOINT_COLLECTION
        value: checkpoints
      - key: MONGODB_CHECKPOINT_WRITES_COLLECTION
        value: checkpoint_writes
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false
      - key: FEEDBACK_TO_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SEND_INTERVIEW_FEEDBACK_EMAIL
        value: "false"
      # Render free tier blocks SMTP ports 587/465 — use Resend (HTTPS) in production:
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: COOKIE_SECURE
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_THREADS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"
